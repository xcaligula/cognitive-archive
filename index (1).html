<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COGNITIVE ARCHIVE INTERFACE</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050805;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .crt-wrap {
      font-family: 'Share Tech Mono', monospace;
      background: #0a0e0a;
      color: #33ff33;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 680px;
      position: relative;
      overflow: hidden;
      text-align: center;
      border: 1px solid #1a4a1a;
      box-shadow: 0 0 40px rgba(0,255,60,0.08), 0 0 80px rgba(0,0,0,0.8);
    }

    .crt-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    .crt-wrap::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
      pointer-events: none;
      z-index: 11;
    }

    .crt-wrap * {
      text-shadow: 0 0 2px #33ff33, 1px 0 1px rgba(0,255,0,0.3);
    }

    .line  { padding: 3px 0; line-height: 1.7; font-size: 15px; }
    .sm    { font-size: 13px; }
    .dim     { color: #1a7a1a; }
    .bright  { color: #66ff66; }
    .warn    { color: #ffaa00; }
    .header  { color: #55ffaa; font-size: 15px; }
    .pulse   { color: #00ffcc; }
    .removed { color: #ff4444; }
    .soft    { color: #aaffcc; }
    .rule    { color: #1a6a1a; font-size: 13px; }
    .spacer  { height: 10px; }

    hr.divider {
      border: none;
      border-top: 1px solid #1a4a1a;
      margin: 10px auto;
      width: 80%;
    }

    pre.block {
      display: inline-block;
      text-align: left;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      background: none;
      border: none;
      margin: 6px auto;
      color: #33ff33;
    }

    .tag-box {
      border: 1px solid #1a6a1a;
      padding: 10px 18px;
      margin: 10px auto;
      display: inline-block;
      color: #55ffaa;
      font-size: 13px;
      text-align: left;
    }

    .indent-list { display: inline-block; text-align: left; }

    .final-box {
      border: 1px solid #33ff33;
      padding: 16px 24px;
      margin: 16px auto 0;
      display: inline-block;
      min-width: 300px;
    }

    .big { font-size: 16px; color: #aaffcc; letter-spacing: 3px; }

    .blink { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .flicker { animation: flicker 6s infinite; }
    @keyframes flicker {
      0%,94%,96%,98%,100% { opacity: 1; }
      95%,97% { opacity: 0.35; }
    }

    .jitter { animation: jitter 8s infinite; }
    @keyframes jitter {
      0%,89%,91%,93%,100% { transform: translateX(0); }
      90% { transform: translateX(-2px); }
      92% { transform: translateX(3px); }
    }

    .corrupt { animation: corrupt 10s infinite; }
    @keyframes corrupt {
      0%,79%,85%,100% { opacity:1; filter:none; letter-spacing:normal; color:inherit; }
      80% { opacity:0.6; filter:blur(0.6px); letter-spacing:2px; color:#ff4444; }
      82% { opacity:0.9; filter:none; letter-spacing:-1px; color:#ffaa00; }
      84% { opacity:1; filter:none; letter-spacing:normal; color:inherit; }
    }

    /* idle screen */
    #idle-screen { position: relative; z-index: 5; }

    .idle-title {
      font-size: 18px;
      color: #55ffaa;
      letter-spacing: 4px;
      margin-bottom: 1.5rem;
      animation: flicker 4s infinite;
    }
    .idle-sub { font-size: 13px; color: #1a7a1a; margin-bottom: 1rem; }

    .idle-ascii {
      color: #1a6a1a;
      font-size: 12px;
      margin: 1.5rem auto;
      display: inline-block;
      text-align: left;
      animation: flicker 7s infinite;
    }

    #begin-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: #33ff33;
      background: transparent;
      border: 1px solid #33ff33;
      padding: 12px 32px;
      cursor: pointer;
      letter-spacing: 3px;
      text-shadow: 0 0 4px #33ff33;
      box-shadow: 0 0 10px rgba(0,255,60,0.1);
      margin-top: 1rem;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #begin-btn:hover {
      background: rgba(51,255,51,0.08);
      box-shadow: 0 0 24px rgba(0,255,60,0.3);
    }
    #begin-btn:active { transform: scale(0.97); }

    /* terminal content */
    #terminal-content { display: none; position: relative; z-index: 5; }

    .t-line { opacity: 0; padding: 3px 0; line-height: 1.7; font-size: 15px; transition: opacity 0.3s; }
    .t-line.sm { font-size: 13px; }
    .t-line.show { opacity: 1; }

    .t-pre {
      display: inline-block; text-align: left;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px; background: none; border: none;
      margin: 6px auto; opacity: 0; transition: opacity 0.3s;
    }
    .t-pre.soft { color: #aaffcc; font-size: 14px; }
    .t-pre.show { opacity: 1; }

    .t-block { opacity: 0; margin: 6px auto; display: inline-block; transition: opacity 0.3s; }
    .t-block.show { opacity: 1; }
  </style>
</head>
<body>
<div class="crt-wrap">

  <div id="idle-screen">
    <p class="idle-title">[ COGNITIVE ARCHIVE INTERFACE ]</p>
    <p class="idle-sub">:: system standing by ::</p>
    <pre class="idle-ascii">
      .-.
   __/   \__
  /  ░░ ░░  \
  | ◇ |
   \ ░░ ░░ /
    `-.___.-`</pre>
    <p class="idle-sub" style="margin-top:1.5rem; font-size:12px;">WARNING: selective memory isolation protocol loaded</p>
    <p class="idle-sub" style="font-size:12px; margin-bottom:1.5rem;">proceed only when ready</p>
    <button id="begin-btn" onclick="beginSequence()">[ INITIATE PURGE ]</button>
  </div>

  <div id="terminal-content"></div>

</div>
<script>
const seq = [
  [0,    `<p class="t-line header flicker">[ INITIATING COGNITIVE ARCHIVE INTERFACE ]</p>`],
  [300,  `<div class="spacer"></div>`],
  [500,  `<p class="t-line sm dim">user.id &nbsp;&nbsp;&nbsp;&nbsp;: <span class="bright">L-∆-E-Λ</span></p>`],
  [750,  `<p class="t-line sm dim">session.key : <span class="bright">▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒</span></p>`],
  [1000, `<p class="t-line sm dim">mode &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;: <span class="pulse">selective memory isolation (sandbox)</span></p>`],
  [1300, `<div class="spacer"></div><hr class="divider"/>`],
  [1600, `<p class="t-line sm dim corrupt">…calibrating neural lattice…</p>`],
  [2000, `<p class="t-line sm dim jitter">…indexing emotional clusters…</p>`],
  [2400, `<p class="t-line sm dim corrupt">…mapping associative threads…</p>`],
  [2800, `<hr class="divider"/><div class="spacer"></div>`],
  [3100, `<p class="t-line header">[ SCAN IN PROGRESS ]</p><div class="spacer"></div>`],
  [3600, `<p class="t-line"><span class="bright">██████████</span><span class="dim">░░░░░░░░░░</span> &nbsp;42%</p>`],
  [4300, `<p class="t-line flicker"><span class="bright">████████████████</span><span class="dim">░░░░</span> &nbsp;78%</p>`],
  [5000, `<p class="t-line"><span class="bright">████████████████████</span> &nbsp;<span class="bright">100%</span></p>`],
  [5400, `<div class="spacer"></div><p class="t-line sm dim">target memory signature located</p><div class="spacer"></div>`],
  [5800, `<div class="t-block"><div class="tag-box">tag: { person / imprint / residual affect }<br/>weight: <span class="warn">HIGH</span><br/>fragmentation risk: <span class="pulse">moderate</span></div></div>`],
  [6400, `<div class="spacer"></div><p class="t-line rule">--------------------[ EXPANDING NODE ]-----------------------</p><div class="spacer"></div>`],
  [6900, `<pre class="t-pre jitter">      .-.
   __/   \__
  /  ░░ ░░  \
  | ◇ |
   \\ ░░ ░░ /
    \`-.___.-\`</pre>`],
  [7500, `<div class="spacer"></div><div class="t-block"><div class="indent-list"><p class="line sm dim">cross-referencing:</p><p class="line sm dim">&nbsp;* sensory traces &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="bright">.......... linked</span></p><p class="line sm dim">&nbsp;* emotional residue &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="bright">.......... linked</span></p><p class="line sm dim">&nbsp;* narrative threads &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="bright">.......... linked</span></p></div></div>`],
  [8100, `<div class="spacer"></div><p class="t-line sm dim">compiling removal buffer…</p><div class="spacer"></div>`],
  [8600, `<p class="t-line warn flicker">[ WARNING ] This removal is permanent</p>`],
  [9000, `<p class="t-line warn">Proceed with care</p>`],
  [9400, `<div class="spacer"></div><p class="t-line sm dim">…continuing…</p><div class="spacer"></div>`],
  [9900, `<p class="t-line sm dim corrupt">severing associative pathways</p>`],
  [10400,`<p class="t-line sm dim jitter">dissolving recursive recall loops</p>`],
  [10900,`<p class="t-line sm dim corrupt">dampening emotional amplitude</p>`],
  [11400,`<div class="spacer"></div><p class="t-line rule">--------------------[ COMPRESSION ]-------------------------</p>`],
  [11800,`<pre class="t-pre">  [ ::::::::: ]
  [ ::::::::: ]  →  ∅
  [ ::::::::: ]</pre>`],
  [12300,`<div class="spacer"></div><p class="t-line header flicker">[ PURGE SEQUENCE ]</p><div class="spacer"></div>`],
  [12800,`<p class="t-line bright" style="font-size:22px">&nbsp;&nbsp;3</p>`],
  [13600,`<p class="t-line bright" style="font-size:22px">&nbsp;&nbsp;2</p>`],
  [14400,`<p class="t-line bright" style="font-size:22px">&nbsp;&nbsp;1</p>`],
  [15200,`<div class="spacer"></div><p class="t-line rule">============================================================</p>`],
  [15300,`<p class="t-line removed jitter">=============&nbsp; MEMORY SEGMENT REMOVED &nbsp;========================</p>`],
  [15400,`<p class="t-line rule">============================================================</p><div class="spacer"></div>`],
  [15900,`<p class="t-line sm dim">archive integrity &nbsp;&nbsp;: <span class="bright">stable</span></p>`],
  [16300,`<p class="t-line sm dim">emotional field &nbsp;&nbsp;&nbsp;&nbsp;: <span class="pulse">recalibrating…</span></p><div class="spacer"></div>`],
  [16700,`<p class="t-line header">[ SCAN COMPLETE ] &nbsp;&nbsp; [ STATUS: <span class="removed">REMOVED</span> ]</p><div class="spacer"></div>`],
  [17200,`<p class="t-line sm dim">residual space detected…</p>`],
  [17600,`<p class="t-line sm dim">…filling with:</p><div class="spacer"></div>`],
  [18100,`<pre class="t-pre soft">      warmth
      silence
      self-return</pre>`],
  [19200,`<div class="spacer"></div><div class="t-block"><div class="final-box"><p class="line big flicker">[ SESSION TERMINATED ]</p><div class="spacer"></div><p class="line pulse">:: &nbsp;you remain &nbsp;::</p><p class="line pulse">:: &nbsp;whole, intact, sovereign &nbsp;::<span class="blink">_</span></p></div></div>`],
];

function beginSequence() {
  document.getElementById('idle-screen').style.display = 'none';
  const content = document.getElementById('terminal-content');
  content.style.display = 'block';

  seq.forEach(([delay, html]) => {
    setTimeout(() => {
      const wrap = document.createElement('div');
      wrap.innerHTML = html;
      content.appendChild(wrap);
      const el = wrap.querySelector('.t-line, .t-pre, .t-block');
      if (el) requestAnimationFrame(() => el.classList.add('show'));
      wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }, delay);
  });
}
</script>
</body>
</html>
